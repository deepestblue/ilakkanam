name: Build for pages

on:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build and deploy GitHub Pages
    permissions:
      contents: read
      pages: write # Required to publish the built artifact to GitHub Pages.
      id-token: write # Required by GitHub Pages deployment's OIDC authentication.

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Install dependencies
        run: npm ci --no-fund

      - name: Build
        run: npm run build

      - name: Upload page artifact
        uses: actions/upload-pages-artifact@5abd6d2e035406f412d089536ee922a104d12f2b
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e
