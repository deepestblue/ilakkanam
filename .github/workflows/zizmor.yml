name: Check GitHub Actions security

on:
  pull_request:
    paths:
      - ".github/actions/**"
      - ".github/workflows/**"
  push:
    branches:
      - main
    paths:
      - ".github/actions/**"
      - ".github/workflows/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  zizmor:
    name: Run zizmor auditor
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Install zizmor
        run: pipx install zizmor==1.24.1

      - name: Run zizmor
        run: zizmor --persona=auditor .
