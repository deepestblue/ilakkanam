    <template id="verb-class-செய்">
        <p class="verb-class-description" data-original-text="தலய்மய்வாய்ந்த இவ்வினத்து வடிவுகளே எல்லாவினத்து வடிவுகளின் அடிப்படயாகும். எனினும் இவ்வினத்தில் சில வினய்களே உள்ளன."></p>
    </template>
    <template id="verb-class-உயர்">
        <p class="verb-class-description" data-original-text="பற்பல வினய்கள் கொண்டுள்ள தலய்மய்வாய்ந்த இவ்வினம் “செய்” இனத்தய்ப்போலவே வடிவுகள் கொள்ளும். ஆனால் போனகாலத்தில் “து” விற்குமுன் “ந்” என மெய்யும் வரும்."></p>
    </template>
    <template id="verb-class-பார்">
        <p class="verb-class-description" data-original-text="பற்பல வினய்கள் கொண்டுள்ள தலய்மய்வாய்ந்த இவ்வினத்தில் “த்து” “க்கு” “ப்பு” போன்ற மிகுந்தவலிகள் பெரும்பான்மய் கொண்டவயாகும். வடமொழியின் இரவல் வினய்கள் பெரும்பாலும் இவ்வினத்துள் புகுமென்பது சிறப்பு."></p>
    </template>
