    <header>
        <h1 data-original-text="வினயினமும் அதற்கேற்ப வடிவுகளும்"></h1>
        <div class="header-intro-block">
            <p class="header-intro"><span data-original-text="தமிழில் வினய்கள் "></span><label class="vinayinam-trigger" for="vinayinam-toggle"><span data-original-text="வெவ்வேறு இனங்களாகப்"></span></label><span data-original-text=" பிரிந்துள்ளன. அவ்வினத்துக்கேற்ப அவ்வினயின் வடிவுகள் மாறும். அவ்வடிவுகள் மேலே."></span></p>
            <input type="checkbox" id="vinayinam-toggle" class="vinayinam-toggle" hidden>
            <div class="vinayinam-panel">
                <label class="vinayinam-close" for="vinayinam-toggle" aria-label="மூடு"><span aria-hidden="true">×</span></label>
                <section>
                    <p class="vinayinam-section-intro" data-original-text="கீழே கூறியவாறு வினயினம் என்பது ஒரே முறயில் வடிவுபெறும் வினய்களின் குழு. அவ்வாறு சில தலய்மய்வாய்ந்த வினயினங்கள் மேலே."></p>
                    <ul>
                        <li><a class="vinayinam-class" href="verbClass.html#verbClass=செய்" data-original-text="செய்"></a></li>
                        <li><a class="vinayinam-class" href="verbClass.html#verbClass=உயர்" data-original-text="உயர்"></a></li>
                        <li><a class="vinayinam-class" href="verbClass.html#verbClass=பார்" data-original-text="பார்"></a></li>
                        <li><a class="vinayinam-class" href="verbClass.html#verbClass=வாங்கு" data-original-text="வாங்கு"></a></li>
                        <li><a class="vinayinam-class" href="verbClass.html#verbClass=திற" data-original-text="திற"></a></li>
                        <li><a class="vinayinam-class" href="verbClass.html#verbClass=இடு" data-original-text="இடு"></a></li>
                    </ul>
                </section>
                <section>
                    <p class="vinayinam-subsection-intro" data-original-text="சற்றரிதான சில வினயினங்கள் மேலே."></p>
                    <ul>
                        <li><a class="vinayinam-class" href="verbClass.html#verbClass=தகு" data-original-text="தகு"></a></li>
                        <li><a class="vinayinam-class" href="verbClass.html#verbClass=வா" data-original-text="வா"></a></li>
                        <li><a class="vinayinam-class" href="verbClass.html#verbClass=காண்" data-original-text="காண்"></a></li>
                        <li><a class="vinayinam-class" href="verbClass.html#verbClass=போது" data-original-text="போது"></a></li>
                        <li><a class="vinayinam-class" href="verbClass.html#verbClass=சொல்" data-original-text="சொல்"></a></li>
                        <li><a class="vinayinam-class" href="verbClass.html#verbClass=போ" data-original-text="போ"></a></li>
                        <li><a class="vinayinam-class" href="verbClass.html#verbClass=நோ" data-original-text="நோ"></a></li>
                        <li><a class="vinayinam-class" href="verbClass.html#verbClass=சா" data-original-text="சா"></a></li>
                    </ul>
                </section>
                <section>
                    <p class="vinayinam-subsection-intro"><span data-original-text="அடிப்படய் வினய்களான "></span><a class="vinayinam-class" href="verbClass.html#verbClass=அல்" data-original-text="அல்"></a><span data-original-text=", "></span><a class="vinayinam-class" href="verbClass.html#verbClass=இல்" data-original-text="இல்"></a><span data-original-text=", "></span><a class="vinayinam-class" href="verbClass.html#verbClass=உள்" data-original-text="உள்"></a><span data-original-text=" என மூவினய்களும் தனித்தனி வடிவு கொண்டு தனித்தே நிற்பவயாகும். இவய் மூன்றுமே பல வடிவுகள் கொள்ளாது சிற்சில வடிவுகளே கொண்டவயாகும்."></span></p>
                </section>
